<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check if the guest is resent in invitation list</title>
</head>
<body>


    <script>
        let guestList=['Tally','Jolly','Molly','rolly','Bully'];
        let yourName=prompt("Tell us your name");
        function checkGuest(yourName){
              if(guestList.includes(yourName)){
                    alert("Yes your are invited !!");
                }
                else{
                    alert("Sorry you are not invited");
                }
                
            }
        
        checkGuest(yourName);
    </script>
    
</body>
</html>
