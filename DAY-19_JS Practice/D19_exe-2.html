<body>
    <!-- 15. Difference Between Number and 13
    Write a JavaScript program to get the difference between a given number and 13, if the number is broader than 13
    return double the absolute difference. 
    “absolute difference”
Difference between two numbers = subtraction
But absolute means → always positive
    -->
<script>
    let num=Number(prompt("Enter the number:"));
    function checkDiff(num){
        let diff=num-13;
        if(num>13){
            console.log(diff*2);
        }
        else{
             console.log(diff);
        }
       
    }
    checkDiff(num);

</script>
    


</body>
