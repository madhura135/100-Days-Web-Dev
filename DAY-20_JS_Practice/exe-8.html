    <title>27. Check if String Starts with 'Java'</title>
</head>
<body>
<!-- 
Write a JavaScript program to check whether a string starts with 'Java' if it does not otherwise.   -->
<script>
    let string=prompt("Enter the string");
    if(string.slice(0,4)==='Java'){
        console.log("string contains java at start: "+string);
    }
    else{
        console.log("not contain Java");
    }
</script>
  
    
</body>
</html>
