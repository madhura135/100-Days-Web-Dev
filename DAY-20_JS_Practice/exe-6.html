<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>25.Check if Number is Multiple of 3 or 7</title>
</head>
<body>
<!-- Write a JavaScript program to check whether a given positive number is a multiple of 3 or 7.   -->
 <script>
    let num=prompt("Enter the number:");
    function checkDivisibleBy3or7(num){
        if(num<=0){
            return ('Invalid for the test,as num is either negative or zero');
        }
        else if(num%7===0 && num%3===0){
            return ('Divisible by both 3 and 7');
            
        }
        else if(num%3===0){
            return ('Divisible by 3');
            
        }
        else if(num%7===0){
            return ('Divisible by 7');
            
        }
        else{
            return ('Neither divisible by 3 nor divisible by 7');
        }
    }
    console.log(checkDivisibleBy3or7(num));

 </script>
    
</body>
</html>
