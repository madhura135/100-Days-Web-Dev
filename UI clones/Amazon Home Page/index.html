<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Home Page</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="grid-container">
        <div class="navbar">
            <div class="logo"><img class="Amazon-logo-img" src="./assets/amazon-logo.png" alt="amazon-logo" /></div>
            <div class="map"><img src="./assets/icons8-map-point-50.png" alt="maps-and-flags">
                <span class="first">Deliver to</span>
                <span class="second"><strong>India</strong></span>
            </div>
            <div class="searchbar"><input type="text" placeholder="Search Amazon">
                <button><img src="./assets/icons8-search-50.png" alt="Search"></button>
            </div>
        </div>
        <div class="nav2"></div>
        <div class="banner"></div>
        <div class="cards">
            <div class="card1">1</div>
            <div class="card2">2</div>
            <div class="card3">3</div>
            <div class="card4">4</div>
        </div>
        <div class="bottomRow1"></div>
        <div class="bottomRow2"></div>

    </div>
</body>

</html>
