<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Home Page</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="grid-container">
        <div class="navbar">
            <div class="logo"><img class="Amazon-logo-img" src="./assets/amazon-logo.png" alt="amazon-logo" /></div>
            <div class="map"><img src="./assets/icons8-map-point-50.png" alt="maps-and-flags">
                <span class="first">Deliver to</span>
                <span class="second"><strong>India</strong></span>
            </div>
            <div class="searchbar">
                <div class="dropdown">

                    <select id="items" name="items">
                        <option value="All department">All</option>
                        <option value="Art & craft">Art & craft</option>
                        <option value="Beauty & Personal Care">Beauty & Personal Care</option>
                        <option value="Baby">Baby</option>
                        <option value="Books">Books</option>
                        <option value="Digital Music">Digital Music</option>
                        <option value="Deals">Deals</option>
                        <option value="Electronics">Electronics</option>
                    </select>
                </div>
                <input type="text" placeholder="Search Amazon">
                <button><img src="./assets/icons8-search-50.png" alt="Search"></button>
            </div>
            <span class="lang">
                <option value="lang">Eng</option>
            </span>
            <span>Hello,sign in <span>Accounts & Lists</span></span>
            <span>Returns & Orders</span>
            <span><img src="./assets/icons8-cart-48.png" alt="cart"></span>
            <span>Cart</span>

        </div>
        <div class="nav2"></div>
        <div class="banner">
            <img src="./assets/MothersDay.jpg" alt="MothersDay offer">
        </div>
        <div class="bar">
            You are on amazon.com. You can also shop on Amazon India for millions of products with fast local delivery.
            <a href="https://www.amazon.com/r/?_encoding=UTF8&aid=Jb1bh6HBRX-p7CkTgHfWPg&dest=https%3A%2F%2Fwww.amazon.in%3Fref%3Daisgw_intl_stripe_in&pd_rd_w=B51wc&content-id=amzn1.sym.5d022dd3-7374-4c36-972c-d2f317605745&pf_rd_p=5d022dd3-7374-4c36-972c-d2f317605745&pf_rd_r=ZSVA43BFGFMCK8C9QV82&pd_rd_wg=jJcON&pd_rd_r=29e9b875-d02e-436a-8630-babd6bbe1e2c&ref_=pd_hp_d_atf_unk">Click
                here to go to amazon.in</a>
        </div>
        <div class="cards">
            <div class="card1">1</div>
            <div class="card2">2</div>
            <div class="card3">3</div>
            <div class="card4">4</div>
        </div>
        <div class="bottomRow1"></div>
        <div class="bottomRow2"></div>

    </div>
</body>

</html>
