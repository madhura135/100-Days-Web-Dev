    <!-- 16. Sum Two Integers (Triple if Equal)
    Write a JavaScript program to compute the sum of the two given integers. If the two values are the same, then return
    triple their sum. -->

    <script>
    
    let a= Number(prompt("enter 1st num"));
    let b= Number(prompt("enter 2nd num"));
    function calSum(a,b){
        if(a!=b){
            let sum=a+b;
            return "Sum of two numbers "+sum;
        }
        else{
            let triple = 3*(a+b);
            return "Two ints are same so triple of their sum is "+triple;
        }
        
    }
    console.log(calSum(a, b));





    </script>
