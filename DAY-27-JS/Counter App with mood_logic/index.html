<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter app with mood logic</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Counter App With Mood Logic</h1>
    <div class="container">
        
         <h2 id="count">0</h2>
         <p id="msg"></p>
         
    </div>
   
    <div class="box">
        <button id="plus">+</button>
        <button id="reset">Reset</button>
        <button id="minus">-</button>
        

    </div>
    <script src="script.js"></script>
</body>
</html>
